<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 {
            background-color: lightgray;
            height: 300px;
            width: 300px;
            border-width: 10px;
            border-style: solid;
            border-color: darkcyan;

            /* padding: 10px;*/
            padding: 10px 10px 10px 10px;

            /* margin: 10px;*/
            margin: 10px auto 10px auto;

            outline: 5px dashed salmon;
        }

        a {
            border: 10px;

            padding: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de Caixa Box-Level</h1>
    <p>Parágrafos também são exmplos de caixas Box-Level, mas os <a href="#">links são exemplos de caixas Inline-Level</a>. Vamos ver como isso tudo funciona.</p>
</body>
</html>
