<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio de Mídia</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/ImagemPequena.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/ImagemMedia.png" type="image/png">
        <img src="imagens/ImagemGrande.png" alt="Imagem flexível">
    </picture>

    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir áudios em HTML5.</p>
    <audio preload="metadata" autoplay controls loop>
        <source src="audios/Tira a boca do Pod - Exercício HTML e CSS.mp3" type="audio/mpeg">
        <source src="audios/Tira a boca do Pod - Exercício HTML e CSS.mp3" type="audio/ogg">
        <source src="audios/Tira a boca do Pod - Exercício HTML e CSS.mp3" type="wav">
        <p>Infelizmente seu navegador não possui suporte para reprodução de áudio. Clique <a href="audios/Tira a boca do Pod - Exercício HTML e CSS.mp3">aqui</a> para baixar o arquivo de áudio!</p>
    </audio>
</body>
</html>
