<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="imagens/favicon.ico" type="image/x-icon">
    <title>Desafio 009</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;    /* Centraliza o título e o grid */
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
         .grid-videos {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Cria 2 colunas iguais */
            gap: 15px; /* Espaço entre as imagens */
            max-width: 800px; /* Largura máxima do conjunto */
        }

        .grid-videos img {
            width: 100%; /* Faz a imagem ocupar o espaço do grid */
            border-radius: 10px; /* Deixa as bordas arredondadas (opcional) */
            transition: transform 0.5s; /* Efeito de zoom suave */
        }

        /* Efeito de aumentar um pouco quando passa o mouse */
        .grid-videos img:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>Videos legais para assistir</h1>
    <div class="grid-videos">
        <a href="video1.html"><img src="imagens/VazouNaBraquiada.jpg" alt="Vídeo 1"></a>
        <a href="video2.html"><img src="imagens/Galeria.jpg" alt="Vídeo 2"></a>
        <a href="video3.html"><img src="imagens/AmaUmMaloqueiro.jpg" alt="Vídeo 3"></a>
        <a href="video4.html"><img src="imagens/VaiMileide.jpg" alt="Vídeo 4"></a>
    </div>
</body>
</html>
