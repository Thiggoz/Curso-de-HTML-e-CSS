<body>
    <h1>Desafio das Imagens Flexíveis</h1>
    <p>Você está vendo a Imagem completa? Experimente ampliar o tamanho do seu navegador para ver a imagem completa</p>
    <picture>
        <source media="(max-width: 1080px)" srcset="Imagens/Foto-Homem-Correndo.jpg" type="image/jpg">
        <source media="(max-width: 1500px)" srcset="Imagens/Foto-Pessoas-Correndo.jpg" type="image/jpg">
        <img src="Imagens/Foto-Pessoas-Correndo.jpg" alt="Imagem Flexível">
    </picture>
</body>
