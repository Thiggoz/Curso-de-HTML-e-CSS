<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        div.container {
            background-color: lightsalmon;
            height: 400px;

            display: flex;
            flex-flow: row wrap;
            align-items: flex-start;
        }

        div.item {
            background-color: lightskyblue;
            border: 1px solid black;
            text-align: center;
            padding: 20px;
            flex-basis: 150px;
        }

        div#i1 {
            align-self: auto;
        }

        div#i2 {
            align-self: auto;
        }

        div#i3 {
            align-self: flex-end;
        }

        div#i4 {
            align-self: auto;
        }

        div#i5 {
            align-self: center;
        }

        div#i6 {
            align-self: flex-start;
        }

        div#i7 {
            align-self: stretch;
        }

        div#i8 {
            align-self: auto;
        }

        div#i9 {
            align-self: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item" id="i1">A</div>
        <div class="item" id="i2">B</div>
        <div class="item" id="i3">Conteúdo um pouco maior</div>
        <div class="item" id="i4">C</div>
        <div class="item" id="i5">D</div>
        <div class="item" id="i6">E</div>
        <div class="item" id="i7">Conteúdo maior ainda que vai ocupar ainda mais espaço</div>
        <div class="item" id="i8">F</div>
        <div class="item" id="i9">G</div>
    </div>
</body>
</html>
