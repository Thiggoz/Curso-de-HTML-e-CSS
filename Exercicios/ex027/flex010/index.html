<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexible Box</title>
    <style>
        body {
            background-color: black;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }


        div.container {
            background-color: rgb(255, 255, 255);
            width: 95vw;
            min-height: 400px;
            border-radius: 10px;

            display: flex;
            flex-flow: row wrap;
            justify-content: center;
            align-items: center;
            flex: auto;
        }

        div.item {
            background-color: lightskyblue;
            border: 1px solid black;
            margin: 10px;
            border-radius: 10px;
            text-align: center;
            align-content: center;
            padding: 20px;
            flex-basis: 150px;
            height: 100px;
        }

        div#i1 {
            align-self: auto;
        }

        div#i2 {
            align-self: auto;
        }

        div#i3 {
            align-self: auto;
        }

        div#i4 {
            align-self: auto;
        }

        div#i5 {
            align-self: auto;
        }

        div#i6 {
            align-self: auto;
        }

        div#i7 {
            align-self: auto;
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <div class="item" id="i1">A</div>
            <div class="item" id="i2">B</div>
            <div class="item" id="i3">C</div>
            <div class="item" id="i4">D</div>
            <div class="item" id="i5">E</div>
            <div class="item" id="i6">F</div>
            <div class="item" id="i7">G</div>
        </div>
    </main>
</body>
</html>
