<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site de Teste</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        header > h1 {
            text-align: center;
            font-weight: bold;
            text-decoration: underline;
        }

        main {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        table {
            border-collapse: collapse;
        }
        
        tbody > tr:nth-child(2n) {
            background-color: lightgray;
        }

        td, th {
            border: 1px solid black;
            padding: 15px;
        }

        td:hover {
            background-color: grey;
            transition-duration: 0.4s;
        }

        th.indice {
            background-color: darkgray;
        }
    </style>
</head>
<body>
    <header>
        <h1>Tabela dos Filmes</h1>
    </header>
    <main>
        <section>
            <table>
                <thead>
                    <tr>
                        <th class="indice" scope="col">Grupo</th>
                        <th class="indice" scope="col">Nomes</th>
                        <th class="indice" scope="colgroup" colspan="3">Filmes</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <th class="indice" scope="rowgroup" rowspan="3">Mulheres</th>
                        <td>Ana Maria Santos</td>
                        <td>Alien</td>
                        <td>Rambo</td>
                        <td>Vingadores</td>
                    </tr>
                    <tr>
                        <td>Beatriz Souza</td>
                        <td>Hulk</td>
                        <td>Inception</td>
                        <td>Batman</td>
                    </tr>
                    <tr>
                        <td>Cláudia Melo</td>
                        <td>Oblivion</td>
                        <td>Matrix</td>
                        <td>Big Hero</td>
                    </tr>
                    <tr>
                        <th class="indice" scope="rowgroup" rowspan="3">Homens</th>
                        <td>Bruno Mendonça</td>
                        <td>Intocáveis</td>
                        <td>Amnésia</td>
                        <td>Gladiador</td>
                    </tr>
                    <tr>
                        <td>Daniel Lourenço</td>
                        <td>Wall-E</td>
                        <td>Oldboy</td>
                        <td>Dangal</td>
                    </tr>
                    <tr>
                        <td>Fabiano Mota</td>
                        <td>Star Wars 5</td>
                        <td>Taxi Driver</td>
                        <td>Toy Story</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>
</body>
</html>
